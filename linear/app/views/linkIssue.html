<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script async type="module" src="https://cdn.jsdelivr.net/npm/@freshworks/crayons@v4/dist/crayons/crayons.esm.js"></script>
  <script async nomodule src="https://cdn.jsdelivr.net/npm/@freshworks/crayons@v4/dist/crayons/crayons.js"></script>
  <link rel="stylesheet" href="../styles/style.css">
  <script src="{{{appclient}}}"></script>
</head>
<body>
  <div class="modal-form-container">
    <fw-select id="link-team-select" label="Team (optional)" placeholder="All teams" hoist></fw-select>
    <fw-input id="link-search-input" label="Search issues" placeholder="Search by title or leave empty with team"></fw-input>
    <fw-button id="link-search-btn" color="primary" size="small">Search</fw-button>
    <div id="link-search-results" class="link-search-results"></div>
    <div class="form-actions">
      <fw-button id="link-cancel-btn" color="secondary">Cancel</fw-button>
    </div>
  </div>
  <script src="linkIssue.js"></script>
</body>
</html>
