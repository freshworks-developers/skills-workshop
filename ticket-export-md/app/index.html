<!DOCTYPE html>
<html lang="en">
<head>
  <title>Ticket Export (Markdown)</title>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script async src="{{{appclient}}}"></script>
  <link rel="stylesheet" type="text/css" href="styles/style.css" />
</head>
<body>
  <div class="main">
    <fw-label value="Export ticket as Markdown"></fw-label>
    <div class="actions">
      <fw-button id="btnCopy" color="primary">
        <fw-icon name="copy" size="16" slot="before-label"></fw-icon>
        Copy to clipboard
      </fw-button>
      <fw-button id="btnWebhook" color="secondary">
        <fw-icon name="link" size="16" slot="before-label"></fw-icon>
        Send to webhook
      </fw-button>
    </div>
    <div id="result"></div>
    <div id="preview" class="preview"></div>
  </div>
</body>
<script defer src="scripts/app.js"></script>
<script async type="module" src="https://cdn.jsdelivr.net/npm/@freshworks/crayons@v4/dist/crayons/crayons.esm.js"></script>
<script async nomodule src="https://cdn.jsdelivr.net/npm/@freshworks/crayons@v4/dist/crayons/crayons.js"></script>
</html>
